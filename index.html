<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Füd — Campus Food, Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <div id="overlay" class="overlay hidden" onclick="closeModal()"></div>
  <div id="modal" class="modal hidden"><div id="modal-box" class="modal-box"></div></div>
  <div id="sidebar-overlay" class="sidebar-bg-overlay hidden" onclick="closeSidebar()"></div>
  <div id="notif-panel" class="notif-panel hidden"></div>
  <div id="notif-backdrop" class="hidden" style="position:fixed;inset:0;z-index:499" onclick="closeNotifPanel()"></div>
  <div id="page-loader" class="page-loader hidden"></div>
  <script>
    // Show the page loader until the DOM is fully loaded
    document.getElementById('page-loader').classList.remove('hidden');
    window.addEventListener('load', () => {
      document.getElementById('page-loader').classList.add('hidden');
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
